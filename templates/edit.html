{% extends 'base.html' %}
{% block title %}Edit Post{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-7">

<div class="card border-0 shadow-lg rounded-4 p-4">
<div class="card-body">

<h2 class="text-center fw-bold mb-4">Edit Post ✏️</h2>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="mb-3">
<label>Title</label>
<input type="text" name="title" value="{{ post.title }}" class="form-control rounded-3">
</div>

<div class="mb-3">
<label>Content</label>
<textarea name="content" rows="6" class="form-control rounded-3">{{ post.content }}</textarea>
</div>

<div class="mb-3">
<label>New Image (optional)</label>
<input type="file" name="image" class="form-control rounded-3">
</div>

<button class="btn btn-warning w-100 rounded-pill">
Update Post
</button>

</form>

</div>
</div>

</div>
</div>
{% endblock %}
