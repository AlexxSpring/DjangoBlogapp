{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center">
<div class="col-md-5">

<div class="card border-0 shadow-lg rounded-4 p-4">
<div class="card-body">

<h2 class="text-center fw-bold mb-4">Welcome Back 👋</h2>
<p class="text-center text-muted mb-4">Login to continue</p>

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label class="form-label">Username</label>
<input type="text" name="username" class="form-control rounded-3 py-2" required>
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" name="password" class="form-control rounded-3 py-2" required>
</div>

<button class="btn btn-primary w-100 rounded-pill py-2">
Login
</button>
</form>

{% if error %}
<p class="text-danger text-center mt-3">{{ error }}</p>
{% endif %}

<p class="text-center mt-4">
Don't have an account?
<a href="/signup/">Signup</a>
</p>

</div>
</div>

</div>
</div>
{% endblock %}
